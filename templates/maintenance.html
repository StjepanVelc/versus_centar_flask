<!DOCTYPE html>
<html>
<head>
    <title>Tehnička nadogradnja</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            background: #f3f4f6;
        }
        .box {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚧 Stranica je u nadogradnji</h2>
        <p>Radimo na poboljšanjima. Vratite se uskoro.</p>
    </div>
</body>
</html>
